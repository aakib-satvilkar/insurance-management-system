# ===== Server =====
server.port=8080

# ===== MySQL Datasource =====
# Update username/password to match your local MySQL setup.
# The database "insurance_db" must exist (see database/schema.sql).
spring.datasource.url=jdbc:mysql://localhost:3306/insurance
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# "update" lets Hibernate create/adjust tables from the entities on startup.
# The database/schema.sql file is also provided separately as required by the assignment.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false
